<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SuperChat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810; --bg2: #0f0f1c; --bg3: #181828;
      --yellow: #ffe135; --pink: #ff3d6b;
      --border: rgba(255,255,255,0.07);
      --text: #fff; --muted: rgba(255,255,255,0.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-app-region: drag;
      user-select: none;
    }

    * { -webkit-app-region: no-drag; }

    .logo {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 4px;
      color: var(--yellow);
      margin-bottom: 4px;
      text-transform: uppercase;
      -webkit-app-region: drag;
    }
    .logo span { color: var(--pink); }

    .tagline {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 28px;
      letter-spacing: 1px;
      text-transform: uppercase;
      -webkit-app-region: drag;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      width: 100%;
      max-width: 320px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg3);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      padding: 7px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab.active { background: var(--bg); color: var(--text); }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      background: var(--bg3);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--yellow); }

    .btn-main {
      width: 100%;
      padding: 12px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, var(--yellow), #ffb300);
      color: #080810;
      font-family: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn-main:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-main:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .error {
      background: rgba(255,61,107,0.1);
      border: 1px solid rgba(255,61,107,0.25);
      color: #ff7096;
      border-radius: 10px;
      padding: 9px 13px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
      line-height: 1.4;
    }
    .error.show { display: block; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 18px 0 14px;
    }

    .server-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .server-row label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .server-row input {
      flex: 1;
      padding: 7px 10px;
      border-radius: 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.15s;
    }
    .server-row input:focus { border-color: var(--yellow); }
    .server-row button {
      padding: 7px 11px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    .server-row button:hover { color: var(--yellow); border-color: var(--yellow); }
  </style>
</head>
<body>

  <div class="logo">SUPER<span>CHAT</span></div>
  <p class="tagline">Streamer Dashboard</p>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">Log In</button>
      <button class="tab" id="tabReg" onclick="switchTab('reg')">Sign Up</button>
    </div>

    <div id="errBox" class="error"></div>

    <!-- LOGIN -->
    <div id="loginForm">
      <div class="field"><label>Username</label><input id="lUser" placeholder="your_username" autocomplete="off"></div>
      <div class="field"><label>Password</label><input id="lPass" type="password" placeholder="••••••••"></div>
      <button class="btn-main" id="loginBtn" onclick="doLogin()">Log In</button>
    </div>

    <!-- SIGN UP -->
    <div id="regForm" style="display:none">
      <div class="field"><label>Username</label><input id="rUser" placeholder="your_username" autocomplete="off"></div>
      <div class="field"><label>Password</label><input id="rPass" type="password" placeholder="At least 6 characters"></div>
      <div class="field"><label>Confirm Password</label><input id="rPass2" type="password" placeholder="Repeat password"></div>
      <button class="btn-main" id="regBtn" onclick="doRegister()">Create Account</button>
    </div>

    <hr class="divider">

    <div class="server-row">
      <label>Server</label>
      <input id="serverUrl" placeholder="http://localhost:3000">
      <button onclick="saveServer()">Save</button>
    </div>
  </div>

<script>
  function switchTab(t) {
    document.getElementById('loginForm').style.display = t === 'login' ? '' : 'none';
    document.getElementById('regForm').style.display   = t === 'reg'   ? '' : 'none';
    document.getElementById('tabLogin').classList.toggle('active', t === 'login');
    document.getElementById('tabReg').classList.toggle('active', t === 'reg');
    hideErr();
  }

  function showErr(msg) {
    const el = document.getElementById('errBox');
    el.textContent = msg; el.classList.add('show');
  }
  function hideErr() { document.getElementById('errBox').classList.remove('show'); }

  async function doLogin() {
    hideErr();
    const username = document.getElementById('lUser').value.trim();
    const password = document.getElementById('lPass').value;
    if (!username || !password) { showErr('Enter your username and password.'); return; }
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Logging in…';
    try {
      await window.api.login(username, password);
      window.location.href = 'settings.html';
    } catch(e) {
      showErr(e.message || 'Login failed.');
      btn.disabled = false; btn.textContent = 'Log In';
    }
  }

  async function doRegister() {
    hideErr();
    const username = document.getElementById('rUser').value.trim();
    const password = document.getElementById('rPass').value;
    const confirm  = document.getElementById('rPass2').value;
    if (!username || !password) { showErr('Fill in all fields.'); return; }
    if (password !== confirm) { showErr('Passwords do not match.'); return; }
    if (password.length < 6) { showErr('Password must be at least 6 characters.'); return; }
    const btn = document.getElementById('regBtn');
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
      await window.api.register(username, password);
      window.location.href = 'settings.html';
    } catch(e) {
      showErr(e.message || 'Registration failed.');
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }

  async function saveServer() {
    const url = document.getElementById('serverUrl').value.trim();
    if (url) {
      await window.api.setServerUrl(url);
      const btn = document.querySelector('.server-row button');
      btn.textContent = 'Saved ✓';
      setTimeout(() => btn.textContent = 'Save', 1500);
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('loginForm').style.display !== 'none') doLogin();
    else doRegister();
  });
</script>
</body>
</html>
