<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 420px;
      height: 140px;
      background: transparent;
      overflow: hidden;
    }

    #wrap {
      position: absolute;
      inset: 0;
      padding: 6px;
      /* Keep GPU layer alive so there's no compositor delay when we animate */
      transform: translateZ(0);
      will-change: transform;
    }

    #bubble {
      width: 100%;
      height: 128px;
      border-radius: 16px;
      padding: 14px 18px 14px;
      position: relative;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
      pointer-events: none;
      transform: translateX(40px) translateZ(0);
      opacity: 0;
      will-change: opacity, transform;
    }

    /* Opaque solid backgrounds — gradients can bleed on transparent Electron windows */
    #bubble.blue   { background-color: #1565c0; box-shadow: 0 8px 32px rgba(0,0,0,0.7); }
    #bubble.green  { background-color: #2e7d32; box-shadow: 0 8px 32px rgba(0,0,0,0.7); }
    #bubble.orange { background-color: #d84315; box-shadow: 0 8px 32px rgba(0,0,0,0.7); }
    #bubble.pink   { background-color: #ad1457; box-shadow: 0 8px 32px rgba(0,0,0,0.7); }
    #bubble.purple { background-color: #6a1b9a; box-shadow: 0 8px 32px rgba(0,0,0,0.7); }
    #bubble.gold   { background-color: #e65100; box-shadow: 0 8px 48px rgba(230,81,0,0.9); border: 2px solid #ffcc02; }

    /* top shine stripe */
    #bubble::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: rgba(255,255,255,0.35);
      border-radius: 16px 16px 0 0;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .av {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: #fff;
      flex-shrink: 0;
    }

    .name  { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.95); }
    .amt   { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 1px; }

    .msg {
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      line-height: 1.15;
      text-shadow: 0 1px 6px rgba(0,0,0,0.6);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-word;
    }

    /* Gold tier pulse ring */
    #bubble.gold::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 20px;
      border: 2px solid rgba(255,204,2,0.4);
      animation: goldPulse 1.5s ease-in-out infinite;
    }

    @keyframes goldPulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.01); }
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="bubble" class="blue">
      <div class="row">
        <div class="av" id="av">?</div>
        <div>
          <div class="name" id="name">Viewer</div>
          <div class="amt"  id="amt">sent $0.00</div>
        </div>
      </div>
      <div class="msg" id="msg">Message</div>
    </div>
  </div>

<script>
  const bubble = document.getElementById('bubble');
  const av     = document.getElementById('av');
  const nameEl = document.getElementById('name');
  const amtEl  = document.getElementById('amt');
  const msgEl  = document.getElementById('msg');

  let hideTimer = null;

  window.api.onSuperchat(data => {
    if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }

    // Snap invisible, update content
    bubble.style.transition = 'none';
    bubble.style.opacity    = '0';
    bubble.style.transform  = 'translateX(40px) translateZ(0)';

    nameEl.textContent = data.sender_name  || 'Viewer';
    amtEl.textContent  = 'sent $' + parseFloat(data.amount || 0).toFixed(2);
    msgEl.textContent  = data.message      || '';
    av.textContent     = (data.sender_name || '?')[0].toUpperCase();
    bubble.className   = data.color || 'blue';

    // Force reflow so the browser commits the above before animating
    void bubble.offsetWidth;

    // Slide in
    bubble.style.transition = 'opacity 0.3s ease-out, transform 0.35s cubic-bezier(0.22,1,0.36,1)';
    bubble.style.opacity    = '1';
    bubble.style.transform  = 'translateX(0) translateZ(0)';

    // Slide out after display time
    hideTimer = setTimeout(() => {
      bubble.style.transition = 'opacity 0.55s ease-in, transform 0.55s ease-in';
      bubble.style.opacity    = '0';
      bubble.style.transform  = 'translateX(28px) translateZ(0)';
      hideTimer = null;
    }, 7500);
  });
</script>
</body>
</html>
