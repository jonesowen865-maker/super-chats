<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperChat — Send Live Superchats</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav>
  <a class="nav-logo" href="/">SUPER<span>CHAT</span></a>
  <div class="nav-right">
    <a class="btn btn-outline" href="/download">Accept Superchats</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-badge">
    <span>⚡</span> Live Streaming Superchats
  </div>
  <h1>
    SEND A<br>
    <span class="accent-yellow">SUPER</span><span class="accent-pink">CHAT</span>
  </h1>
  <p class="hero-sub">Support your favorite streamer instantly with a highlighted message they can't miss.</p>

  <div class="search-wrap">
    <input
      type="text"
      class="search-box"
      id="searchInput"
      placeholder="Where do you want to send it?"
      autocomplete="off"
    >
    <button class="search-btn" id="searchBtn" title="Search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </button>
  </div>

</section>

<script>
  const input = document.getElementById('searchInput');
  const btn = document.getElementById('searchBtn');

  function goToSend() {
    const val = input.value.trim();
    if (val) window.location.href = '/send?to=' + encodeURIComponent(val);
  }

  btn.addEventListener('click', goToSend);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') goToSend(); });
</script>
</body>
</html>
